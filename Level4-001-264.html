<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 4 單字 001–264 互動詳解卷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink-mid: #3d3d5c;
  --ink-light: #6b6b8a;
  --paper: #faf9f6;
  --paper-warm: #f4f1eb;
  --paper-line: #e8e4db;
  --accent: #c41e3a;
  --accent-light: #fce8ec;
  --gold: #b8860b;
  --gold-light: #fdf6e3;
  --blue: #1a4a7a;
  --blue-light: #e8f0fa;
  --green: #1a6640;
  --green-light: #e8f5ee;
  --shadow: rgba(26,26,46,0.12);
  --radius: 6px;
  --font-body: 'Noto Sans TC', sans-serif;
  --font-serif: 'Noto Serif TC', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.8;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: #f0ede6;
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
.site-header h1 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.header-meta { font-size: 12px; color: #a0a0b8; font-family: var(--font-mono); }
.vocab-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 8px 16px;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
}
.vocab-btn:hover { background: #a01830; }

/* ── LAYOUT ── */
.container { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── ANSWER KEY BAR ── */
.answer-bar {
  background: var(--ink);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 32px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #c8c8e0;
}
.answer-bar .bar-label { color: #fff; font-weight: 600; margin-bottom: 8px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.answer-row { display: flex; flex-wrap: wrap; gap: 4px; }
.ans-chip {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 2px 8px;
  font-size: 12px;
  white-space: nowrap;
}
.ans-chip span { color: #f0c040; font-weight: 600; }

/* ── SECTION HEADERS ── */
.section-header {
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  margin: 40px 0 24px;
  background: var(--accent-light);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.section-header-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.section-header-title-row h2 {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  margin: 0;
}
.section-full-trans-btn {
  background: #fff;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  border-radius: 4px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  min-height: 32px;
  touch-action: manipulation;
  flex-shrink: 0;
}
.section-full-trans-btn:hover { background: #fff8fa; }
.section-header p { font-size: 13px; color: var(--ink-mid); margin-top: 4px; }

/* ── QUESTION CARDS ── */
.q-card {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  transition: box-shadow 0.2s;
}
.q-card:hover { box-shadow: 0 2px 10px var(--shadow); }

.q-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-mono);
  margin-right: 8px;
  flex-shrink: 0;
}
.q-answer-badge {
  display: inline-flex;
  align-items: center;
  background: var(--green);
  color: #fff;
  border-radius: 3px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-mono);
  margin-right: 12px;
  flex-shrink: 0;
}

/* ── SENTENCE AREA ── */
.sentence-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.sentence-text {
  flex: 1;
  line-height: 2;
  font-size: 15px;
  min-width: 0;
}

/* ── CLICKABLE WORDS ── */
.word-btn {
  display: inline;
  cursor: pointer;
  border-bottom: 1px dotted var(--ink-light);
  transition: background 0.15s, color 0.15s;
  border-radius: 2px;
  padding: 0 1px;
}
.word-btn:hover {
  background: var(--blue-light);
  color: var(--blue);
  border-bottom-color: var(--blue);
}

/* ── BLANK BUTTONS ── */
.blank-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--gold-light);
  border: 1.5px solid var(--gold);
  border-radius: 4px;
  padding: 2px 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--gold);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s;
  margin: 0 2px;
}
.blank-btn:hover { background: #fdf0c0; }
.blank-btn .blank-num { font-size: 11px; color: var(--ink-light); }

/* ── OPTIONS DISPLAY ── */
.options-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
/* passage option pills – compact, word only */
.opt-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--paper-warm);
  border: 1.5px solid var(--paper-line);
  border-radius: 6px;
  padding: 5px 11px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.13s, border-color 0.13s, box-shadow 0.13s;
  white-space: nowrap;
  font-family: var(--font-mono);
}
.opt-chip:hover { background: var(--blue-light); border-color: var(--blue); box-shadow: 0 1px 4px rgba(26,74,122,0.12); }
.opt-chip .opt-label {
  font-weight: 800;
  font-size: 11px;
  color: var(--ink-light);
  min-width: 12px;
}

/* ── TRANSLATE BTN ── */
.translate-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--paper-line);
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 12px;
  color: var(--ink-mid);
  cursor: pointer;
  font-family: var(--font-body);
  margin-top: 8px;
  transition: background 0.15s, border-color 0.15s;
}
.translate-btn:hover { background: var(--paper-warm); border-color: var(--ink-light); }

/* ── PASSAGE STYLES ── */
.passage-box {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.passage-title {
  background: var(--ink);
  color: #f0ede6;
  padding: 10px 18px;
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.passage-content { padding: 20px 22px; }

.sentence-block {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--paper-line);
}
.sentence-block:last-child { border-bottom: none; }
.sentence-en { flex: 1; line-height: 2; }
.sentence-zh {
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.7;
  margin-top: 4px;
  padding: 6px 10px;
  background: var(--paper-warm);
  border-radius: 4px;
  border-left: 2px solid var(--paper-line);
}

/* ── OPTIONS BOX ── */
.options-box {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
}
.options-box-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.options-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* ── POPUP OVERLAY ── */
#popup-overlay {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 999;
  display: none;
  background: transparent;
  cursor: default;
}
#popup-overlay.open {
  display: block;
  background: rgba(15, 23, 42, 0.42);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

.popup-card {
  position: absolute;
  z-index: 1000;
  background: #1e293b;
  color: #f8fafc;
  border: 1px solid #0f172a;
  border-radius: 12px;
  box-shadow: 0 10px 32px rgba(0,0,0,0.38);
  min-width: 270px;
  width: min(360px, calc(100vw - 24px));
  max-width: 360px;
  max-height: min(88dvh, 88vh, 560px);
  padding: 12px 14px;
  padding-top: max(12px, env(safe-area-inset-top, 0px));
  display: none;
  overflow: hidden;
  animation: popIn 0.12s ease-out;
  touch-action: manipulation;
}
.popup-card.open { display: block; }

/* 手機 / iPad / 觸控螢幕：底部卡片，避免被裁切 */
.popup-card.popup-compact {
  left: 50% !important;
  right: auto !important;
  top: auto !important;
  bottom: 0 !important;
  transform: translateX(-50%) !important;
  width: calc(100% - 12px);
  max-width: 520px;
  max-height: min(92dvh, 92vh);
  border-radius: 16px 16px 0 0;
  padding-bottom: max(14px, env(safe-area-inset-bottom, 0px));
  animation: popSlideUp 0.18s ease-out;
}
@keyframes popSlideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

#popup-content {
  max-height: min(76dvh, 76vh, 480px);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-right: 2px;
}
.popup-card.popup-compact #popup-content {
  max-height: min(72dvh, calc(92vh - 88px), calc(92dvh - 88px));
}
.popup-blank-section {
  max-height: min(40dvh, 40vh, 260px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #475569;
}
.pop-folders-panel { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #475569; }

body.popup-scroll-lock { overflow: auto; }

@keyframes popIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── ALL POPUPS: unified dark style ── */
.popup-loading { color: #94a3b8; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.spinner { width: 16px; height: 16px; border: 2px solid #334155; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* legacy classes kept for safety – override to dark */
.popup-card > .popup-close {
  position: absolute;
  top: max(4px, env(safe-area-inset-top, 0px));
  right: max(4px, env(safe-area-inset-right, 0px));
  background: none;
  border: none;
  font-size: 18px;
  color: #94a3b8;
  cursor: pointer;
  line-height: 1;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.popup-close:hover { color: #f8fafc; }
.popup-word { font-family: var(--font-mono); font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 2px; }
.popup-ipa { font-family: var(--font-mono); font-size: 12px; color: #38bdf8; margin-bottom: 5px; }
.popup-pos { display: inline-block; background: #334155; color: #94a3b8; border-radius: 3px; padding: 1px 7px; font-size: 11px; font-weight: 700; margin-bottom: 6px; font-style: italic; }
.popup-meaning { font-size: 13.5px; color: #e2e8f0; line-height: 1.7; }

/* blank popup */
.blank-popup-title { font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; }
.blank-answer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.blank-answer-word { font-family: var(--font-mono); font-size: 18px; font-weight: 800; color: #34d399; }
.blank-answer-pos { background: #064e3b; color: #34d399; border-radius: 3px; padding: 1px 8px; font-size: 11px; font-weight: 700; }
.blank-reason { font-size: 13px; color: #cbd5e1; line-height: 1.85; white-space: pre-line; }

/* option-set popup (Part 1 ABCD) */
.option-set-title { font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #334155; }
.option-set-item { display: grid; grid-template-columns: 18px 1fr 1fr; gap: 4px 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid #ffffff0d; font-size: 13px; }
.option-set-item:last-child { border-bottom: none; }
.option-set-item .lbl { font-family: var(--font-mono); font-weight: 800; color: #94a3b8; }
.option-set-item.correct-opt .lbl { color: #34d399; }
.option-set-item .wd { font-family: var(--font-mono); font-weight: 700; color: #e2e8f0; }
.option-set-item.correct-opt .wd { color: #34d399; }
.option-set-item .ps { font-size: 10px; color: #64748b; font-style: italic; white-space: nowrap; }
.option-set-item .mn { color: #94a3b8; font-size: 12.5px; }
.option-set-item.correct-opt .mn { color: #6ee7b7; }

/* translate popup */
.trans-popup-zh { font-size: 14px; line-height: 1.9; color: #f1f5f9; }

/* ── VOCAB LIBRARY ── */
#vocab-panel {
  position: fixed;
  top: 0; right: -380px;
  width: 360px;
  height: 100vh;
  background: #fff;
  border-left: 1px solid var(--paper-line);
  z-index: 500;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
  box-shadow: -4px 0 20px var(--shadow);
}
#vocab-panel.open { right: 0; }
.vocab-panel-header {
  background: var(--ink);
  color: #f0ede6;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.vocab-panel-header h3 { font-family: var(--font-serif); font-size: 15px; }
.vocab-panel-close { background: none; border: none; color: #f0ede6; font-size: 20px; cursor: pointer; }
.vocab-list { flex: 1; overflow-y: auto; padding: 12px; }
.vocab-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--paper-line);
  border-radius: 4px;
  margin-bottom: 6px;
  font-size: 13px;
  animation: fadeIn 0.2s ease;
}
.vocab-item .vi-word { font-family: var(--font-mono); font-weight: 600; color: var(--ink); min-width: 90px; }
.vocab-item .vi-ipa { color: var(--blue); font-family: var(--font-mono); font-size: 11px; }
.vocab-item .vi-pos { font-size: 10px; background: var(--paper-warm); color: var(--ink-light); border-radius: 2px; padding: 1px 5px; }
.vocab-item .vi-mean { color: var(--ink-mid); flex: 1; }
.vocab-item .vi-del { background: none; border: none; color: var(--ink-light); cursor: pointer; font-size: 16px; }
.vocab-empty { text-align: center; padding: 40px 20px; color: var(--ink-light); font-size: 14px; }
.vocab-footer { padding: 12px 16px; border-top: 1px solid var(--paper-line); }
.vocab-save-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.vocab-save-btn:hover { background: #a01830; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .container { padding: 16px 12px 60px; }
  .option-set-item {
    font-size: 12px;
    grid-template-columns: 22px 1fr;
    padding: 10px 4px;
    min-height: 44px;
  }
  .option-set-item .mn { grid-column: 2; }
  .opt-chip, .blank-btn, .word-btn { min-height: 36px; }
}
@media (min-width: 601px) and (max-width: 1024px) {
  .popup-card:not(.popup-compact) {
    max-width: min(400px, calc(100vw - 32px));
  }
}

/* ── B4L7-style popup CSS ── */
.pop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;width:100%}
.pop-title-group{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.pop-word{font-size:17px;font-weight:800;color:#fff}
.pop-symbol{color:#cbd5e1;font-size:12px;font-weight:500}
.pop-close{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:0 2px;font-weight:bold;flex-shrink:0}
.pop-close:hover{color:#fff}
.pop-audio-btn{background:#3b82f6;border:none;border-radius:4px;color:#fff;padding:3px 8px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;margin-bottom:4px}
.pop-audio-btn:hover{background:#2563eb}
.pop-star-svg-btn{background:none;border:none;cursor:pointer;padding:8px;margin:-8px 0;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0;min-width:44px;min-height:44px;touch-action:manipulation}
.pop-star-svg-btn svg{width:26px;height:26px;transition:all .1s ease}
.pop-close{min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.pop-audio-btn{min-height:40px;padding:8px 12px;touch-action:manipulation}
.pop-folder-btn{min-height:44px;padding:10px 12px;touch-action:manipulation;font-size:13px}
.pop-zh-row{font-size:13.5px;margin:4px 0;color:#38bdf8;font-weight:bold}
.pop-pos-tag{color:#94a3b8;font-style:italic;font-size:12px;margin-right:4px}
.pop-ex{background:#0f172a;border-left:2px solid #64748b;padding:4px 8px;font-size:12px;color:#e2e8f0;border-radius:0 4px 4px 0;margin-top:6px;line-height:1.5}
.pop-folder-title{font-size:12px;font-weight:bold;margin:8px 0 4px;color:#94a3b8}
.pop-folder-grid{display:grid;grid-template-columns:1fr;gap:5px;margin-top:4px}
.pop-folder-btn{background:#334155;border:1px solid #475569;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:bold;color:#e2e8f0;text-align:left;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.pop-folder-btn:hover{background:#3e536b}
.pop-folder-btn.has-word{border-color:#f43f5e;background:#4c0519;color:#fecdd3}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>Level 4 單字 001–264 ✦ 互動詳解卷</h1>
    <div class="header-meta">點擊任何單字查看解說 · 點空格查看答案解析</div>
  </div>
</header>

<div class="container">

  <!-- PART 1 -->
  <div class="section-header">
    <h2>Part 1：文意字彙選擇</h2>
  </div>
  <div id="part1-container"></div>

  <!-- PART 2 PASSAGE 1 -->
  <div class="section-header" id="passage1-section-header">
    <h2>Part 2：文意選填 ── Passage 1</h2>
  </div>
  <div id="passage1-options-container"></div>
  <div id="passage1-container"></div>

  <!-- PART 2 PASSAGE 2 -->
  <div class="section-header" id="passage2-section-header">
    <h2>Part 2：文意選填 ── Passage 2</h2>
  </div>
  <div id="passage2-options-container"></div>
  <div id="passage2-container"></div>

</div>

<!-- Popup overlay -->

    fullZh:"村民們籌備了一場年度的盛事來祭拜他們的祖先。在懸崖附近的小屋裡，一位勇敢的新郎和一位具有藝術才華的同伴想要娛樂社區。他們決定創作出一個關於乞丐成為英雄指揮官的特別故事。為了傳達這個故事，他們雇用了一家當地的機構來組織一場傳統芭蕾舞和青年合唱團。整個小鎮都在期待這場雄偉的週末慶典。\n\n然而，業餘舞者們面臨了一個重大的障礙。女主角身手笨拙，她的行為不可預測，而且當她感到焦慮時就會眨眼或咳嗽。在議事廳的集會中，評論家開始批評她那身粗糙的服裝，並與導演發生衝突。緊張的氣氛差點讓創意團隊停止了這場演出。\n\n幸好，一位精明的經紀人提供了協助。她給了女孩一顆阿斯匹靈來安撫她，一條漂亮的手鍊來增加吸引力，以及一個可供咀嚼的軟木塞來練習口音。在週年紀念的夜晚，當鮮花盛開之際，觀眾給予了他們響亮的讚許。圓形劇場裡充滿了歡樂。沒有人表現出禮貌的束縛；他們只是為這場不可思議的藝術結合喝采，證明了合作可以克服任何殘酷的處境。"

/* ── PARSE SENTENCE WITH BLANKS ── */
function parseSentence(enText, qNum, options, isPassage = false) {
  const fragment = document.createDocumentFragment();
  // Split by [NUM:LETTER:WORD:POS:MEANING] or [BLANK]
  const blankRe = /\[(\d+):([A-J]):([^:]+):([^:]+):([^\]]+)\]|\[BLANK\]/g;
  let last = 0;
  let match;
  const tokens = enText.split(/(\s+)/);
  
  // We'll do a character-level parse
  let text = enText;
  let parts = [];
  let pos = 0;
  
  while ((match = blankRe.exec(text)) !== null) {
    // Text before blank
    if (match.index > pos) {
      parts.push({ type: 'text', val: text.slice(pos, match.index) });
    }
    if (match[0] === '[BLANK]') {
      parts.push({ type: 'blank', num: qNum });
    } else {
      parts.push({ type: 'blank', num: parseInt(match[1]), letter: match[2], word: match[3], pos: match[4], meaning: match[5] });
    }
    pos = match.index + match[0].length;
  }
  if (pos < text.length) parts.push({ type: 'text', val: text.slice(pos) });
  
  for (const part of parts) {
    if (part.type === 'text') {
      const words = part.val.split(/(\s+|[,.;:!?()])/);
      for (const token of words) {
        if (!token.trim() || /^[\s,.;:!?()]+$/.test(token)) {
          fragment.appendChild(document.createTextNode(token));
        } else {
          const clean = token.replace(/[^a-zA-Z']/g, '').toLowerCase();
          if (!clean || SKIP_WORDS.has(clean)) {
            fragment.appendChild(document.createTextNode(token));
          } else {
            const span = document.createElement('span');
            span.className = 'word-btn';
            span.textContent = token;
            span.dataset.word = clean;
            span.addEventListener('click', (e) => { e.stopPropagation(); showWordPopup(e, clean, span); });
            fragment.appendChild(span);
          }
        }
      }
    } else {
      const blankData = isPassage ? findBlankData(part.num) : null;
      const btn = document.createElement('button');
      btn.className = 'blank-btn';
      btn.innerHTML = `<span class="blank-num">${part.num}</span> ${part.word || '___'}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPassage) {
          showBlankPopup(e, part.num);
        } else {
          showOptionsPopup(e, qNum, options, part.letter);
        }
      });
      fragment.appendChild(btn);
    }
  }
  return fragment;
}

/* ── FIND BLANK DATA ── */
let allBlanks = {};
function buildBlankIndex() {
  for (const s of EXAM.passage1.sentences) {
    for (const b of s.blanks) allBlanks[b.num] = b;
  }
  for (const s of EXAM.passage2.sentences) {
    for (const b of s.blanks) allBlanks[b.num] = b;
  }
}

function findBlankData(num) {
  return allBlanks[num] || null;
}

function buildPart1() {
  const container = document.getElementById('part1-container');
  for (const q of EXAM.part1) {
    const card = document.createElement('div');
    card.className = 'q-card';
    
    const header = document.createElement('div');
    header.className = 'sentence-line';

    numBadge.className = 'q-num';
    numBadge.textContent = q.num;
    
    // ansBadge removed per user request
    
    const sentSpan = document.createElement('span');
    sentSpan.className = 'sentence-text';
    
    // Build clickable sentence with blank
    const sentText = q.sentence.replace('[BLANK]', `[BLANK]`);
    // Replace the blank token
    const parts = q.sentence.split('[BLANK]');
    
    for (let i = 0; i < parts.length; i++) {
      appendWords(sentSpan, parts[i], q.num, q.options);
      if (i < parts.length - 1) {
        const blankBtn = document.createElement('button');
        blankBtn.className = 'blank-btn';
        const ansOpt = q.options.find(o => o.l === q.ans);
        blankBtn.innerHTML = `<span class="blank-num">${q.num}</span>${ansOpt ? ansOpt.w : '___'}`;
        blankBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showOptionsPopup(e, q.num, q.options, q.ans);
        });
        sentSpan.appendChild(blankBtn);
      }
    }
    
    // Translate button inline at end of sentence
    const transBtn = document.createElement('button');
    transBtn.className = 'translate-btn';
    transBtn.style.cssText = 'display:inline-flex;vertical-align:middle;margin-left:6px;flex-shrink:0;';
    transBtn.innerHTML = '🌐';
    transBtn.title = '查看中文翻譯';
    transBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showTranslatePopup(e, q.translation);
    });
    sentSpan.appendChild(transBtn);   // ← inline inside sentence span

    header.appendChild(numBadge);
    // ansBadge not appended
    header.appendChild(sentSpan);
    card.appendChild(header);
    
    // Options row (clickable)
    const optsRow = document.createElement('div');
    optsRow.className = 'options-row';
    for (const opt of q.options) {
      const chip = document.createElement('span');
      chip.className = 'opt-chip' + (opt.l === q.ans ? ' correct' : '');
      chip.innerHTML = `<span class="opt-label">${opt.l}</span><span>${opt.w}</span>`;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        showSingleWordInfo(e, opt);   // 點單一選項 → 只顯示那個字的解說
      });
      optsRow.appendChild(chip);
    }
    card.appendChild(optsRow);
    
    container.appendChild(card);
  }
}

function appendWords(container, text, qNum, options) {
  const tokens = text.split(/(\s+|[,.;:!?()']+)/);
  for (const token of tokens) {
    if (!token || /^[\s,.;:!?()']+$/.test(token)) {
      container.appendChild(document.createTextNode(token));
    } else {
      const clean = token.replace(/[^a-zA-Z']/g, '').toLowerCase().replace(/^'|'$/g,'');
      if (!clean || SKIP_WORDS.has(clean) || clean.length <= 1) {
        container.appendChild(document.createTextNode(token));
      } else {
        const span = document.createElement('span');
        span.className = 'word-btn';
        span.textContent = token;
        span.dataset.word = clean;
        span.addEventListener('click', (e) => { e.stopPropagation(); showWordPopup(e, clean, span); });
        container.appendChild(span);
      }
    }
  }
}

    const block = document.createElement('div');

    // Parse sentence with blanks
    const parsed = parseSentencePassage(sent.en, sent.blanks, passage);
    enDiv.appendChild(parsed);
    
    // Translation button inline at end of sentence
    const zhBtn = document.createElement('button');
    zhBtn.className = 'translate-btn';
    zhBtn.style.cssText = 'display:inline-flex;vertical-align:middle;margin-left:6px;flex-shrink:0;';
    zhBtn.innerHTML = '🌐';
    zhBtn.title = '查看中文翻譯';
    zhBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showTranslatePopup(e, sent.zh);
    });
    enDiv.appendChild(zhBtn);   // ← inline inside sentence div
    
    block.appendChild(enDiv);
    
    content.appendChild(block);
  }
  
  box.appendChild(content);
  container.appendChild(box);
}

function parseSentencePassage(enText, blanks, passage) {
  const frag = document.createDocumentFragment();
  const blankRe = /\[(\d+):([A-J]):([^:]+):([^:]+):([^\]]+)\]/g;
  let text = enText;
  let parts = [];
  let pos = 0;
  let match;
  
  while ((match = blankRe.exec(text)) !== null) {
    if (match.index > pos) parts.push({ type: 'text', val: text.slice(pos, match.index) });
    parts.push({ type: 'blank', num: parseInt(match[1]), letter: match[2], word: match[3] });
    pos = match.index + match[0].length;
  }
  if (pos < text.length) parts.push({ type: 'text', val: text.slice(pos) });
  
  for (const part of parts) {
    if (part.type === 'text') {
      const container = document.createDocumentFragment();
      appendWords(container, part.val, null, null);
      frag.appendChild(container);
    } else {
      const b = allBlanks[part.num];
      const btn = document.createElement('button');
      btn.className = 'blank-btn';
      btn.innerHTML = `<span class="blank-num">${part.num}</span>${part.word}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showBlankPopup(e, part.num);
      });
      frag.appendChild(btn);
    }
  }
  return frag;
}

/* ── POPUP FUNCTIONS ── */
let _lastPopupPointer = null;

function useCompactPopup() {
  return window.matchMedia('(max-width: 900px)').matches
    || window.matchMedia('(hover: none)').matches
    || window.matchMedia('(pointer: coarse)').matches;
}

function positionPopup(e) {
  if (e && e.clientX != null) _lastPopupPointer = { x: e.clientX, y: e.clientY };
  const popup = document.getElementById('popup-card');
  const compact = useCompactPopup();
  popup.classList.toggle('popup-compact', compact);

  const place = () => {
    if (compact) {
      popup.style.left = (window.pageXOffset + (window.innerWidth / 2)) + 'px';
      popup.style.right = 'auto';
      popup.style.top = 'auto';
      popup.style.bottom = '';
      popup.style.top = (window.pageYOffset + window.innerHeight - popup.offsetHeight) + 'px';
      popup.style.transform = 'translateX(-50%)';
      return;
    }
    popup.style.transform = '';
    popup.style.bottom = 'auto';
    const pw = popup.offsetWidth || 340;
    const ph = popup.offsetHeight || 320;
    const pad = 12;
    const x = (_lastPopupPointer ? _lastPopupPointer.x : window.innerWidth / 2) + window.pageXOffset;
    const y = (_lastPopupPointer ? _lastPopupPointer.y : window.innerHeight / 2) + window.pageYOffset;
    let left = x + pad;
    let top = y + pad;
    const maxLeft = window.pageXOffset + window.innerWidth - pw - pad;
    const minLeft = window.pageXOffset + pad;
    const maxTop = window.pageYOffset + window.innerHeight - ph - pad;
    const minTop = window.pageYOffset + pad;
    if (left > maxLeft) left = Math.max(minLeft, x - pw - pad);
    if (top > maxTop) top = Math.max(minTop, y - ph - pad);
    if (left < minLeft) left = minLeft;
    if (top < minTop) top = minTop;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  };
  requestAnimationFrame(() => requestAnimationFrame(place));
}

function lockPageScroll(lock) {
  // Keep page scroll available after opening popups.
  document.body.classList.remove('popup-scroll-lock');
}

function isPopupOpen() {
  return document.getElementById('popup-card').classList.contains('open');
}

let _popupWasOpenAtPointerDown = false;

/** 點遮罩或彈窗本體即關閉（遮罩為 fixed 全螢幕，捲動後空白區也能點到） */
function dismissPopupFromBackdrop(e) {
  if (!isPopupOpen()) return;

    e.stopPropagation();
  }
}

function wirePopupDismiss() {
  const overlay = document.getElementById('popup-overlay');

}

function shouldSkipOpenAfterDismiss() {
  if (!_popupWasOpenAtPointerDown) return false;
  _popupWasOpenAtPointerDown = false;

}

/* ── 7000單 custom_folders（同 B4L7：每部裝置讀自己的 localStorage）── */
const V7000_FOLDER_KEY = 'custom_folders';
let _popupWordCtx = null;

function wordKey(en) {
  return String(en || '').toLowerCase().trim();
}
function folderWordEn(x) {
  if (!x) return '';
  return wordKey(x.en || x.word || x.english || x.title);
}
function getFolders() {
  try {
    const raw = localStorage.getItem(V7000_FOLDER_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
/** 僅學生自訂資料夾；不顯示、不寫入 7000單 系統內建（preset）資料夾 */
function isUserFolder(f) {
  return !!(f && f.id && String(f.name || '').trim() && !f.preset);
}
function getSavableFolders() {
  return getFolders()
    .filter(isUserFolder)
    .slice()
    .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-Hant'));
}
function saveFolders(arr) {
  try { localStorage.setItem(V7000_FOLDER_KEY, JSON.stringify(arr)); } catch(e) {}
}
function isWordSavedAnywhere(en) {
  const w = wordKey(en);
  return getSavableFolders().some(f =>
    Array.isArray(f.words) && f.words.some(x => folderWordEn(x) === w)
  );
}
function toggleWordInFolder(folderId, wordObj) {
  const folders = getFolders();
  const f = folders.find(x => x.id === folderId);
  if (!f || f.preset) return false;
  if (!Array.isArray(f.words)) f.words = [];
  const targetWord = wordKey(wordObj.en);
  const idx = f.words.findIndex(x => folderWordEn(x) === targetWord);
  if (idx > -1) { f.words.splice(idx, 1); saveFolders(folders); return false; }
  f.words.push(wordObj);
  saveFolders(folders);
  return true;
}
function refreshFoldersPanel(panelKey) {
  if (!_popupWordCtx || _popupWordCtx.panelKey !== panelKey) return;
  const grid = document.querySelector(`#folders_panel_${panelKey} .pop-folder-grid`);
  if (!grid) return;
  const { word, info } = _popupWordCtx;
  const meaning = info.zh || info.meaning || '';
  grid.innerHTML = buildFolderButtonsHtml(word, info.ipa || '', info.pos || '', meaning);
  const star = document.querySelector(`#popup-content .pop-star-svg-btn`);
  if (star) star.innerHTML = starSvg(isWordSavedAnywhere(word));
}
function starSvg(saved) {
  return saved
    ? `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z" fill="#f43f5e" stroke="#f43f5e" stroke-width="1.5" stroke-linejoin="round"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z" fill="#FFD700" stroke="#FFD700" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}
function refreshAllStarButtons(rawWord) {
  const saved = isWordSavedAnywhere(rawWord);
  document.querySelectorAll('.pop-star-svg-btn').forEach(sb => { sb.innerHTML = starSvg(saved); });
}
function buildFolderButtonsHtml(rawWord, ipa, pos, meaning) {
  const folders = getSavableFolders();
  if (folders.length === 0) {
    return `<div style="font-size:12px;color:#cbd5e1;background:#334155;padding:10px 12px;border-radius:6px;line-height:1.65;">📌 尚未設置資料夾<br>請至 <strong>7000單 App</strong> 新增自己的資料夾後，再回來點星星存入。<br><span style="color:#94a3b8;font-size:11px;margin-top:4px;display:block">（系統內建字表資料夾不會顯示，也無法從檢討卷修改）</span></div>`;
  }
  const targetWord = (rawWord || '').toLowerCase().trim();
  const esc = rawWord.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return folders.map(f => {
    const inThis = Array.isArray(f.words) && f.words.some(x => folderWordEn(x) === targetWord);
    const dm = (meaning || '').replace(/"/g, '&quot;');
    const dp = (pos || '').replace(/"/g, '&quot;');
    return `<button class="pop-folder-btn ${inThis ? 'has-word' : ''}" data-mean="${dm}" data-pos="${dp}" onclick="toggleFolderWord(event,'${f.id}','${esc}',this)">📁 ${f.name}${inThis ? ' ✓' : ''}</button>`;
  }).join('');
}
function toggleFolderWord(event, folderId, rawWord, btn) {
  event.stopPropagation();
  const folder = getFolders().find(x => x.id === folderId);
  if (!folder || folder.preset) return;
  const key = (rawWord || '').toLowerCase().trim();
  const cached = wordCache[key];
  const wordObj = {
    en: (rawWord || '').trim(),
    zh: (cached && cached.zh) || btn.getAttribute('data-mean') || '',
    pos: (cached && cached.pos) || btn.getAttribute('data-pos') || '',
    level: 0,
    custom: true
  };
  const added = toggleWordInFolder(folderId, wordObj);
  if (added) {
    btn.classList.add('has-word');
    if (!btn.textContent.includes('✓')) btn.textContent = btn.textContent.trimEnd() + ' ✓';
  } else {
    btn.classList.remove('has-word');
    btn.textContent = btn.textContent.replace(' ✓', '');
  }
  refreshAllStarButtons(rawWord);
}
function toggleStarPanel(event, panelKey) {
  event.stopPropagation();
  const panel = document.getElementById('folders_panel_' + panelKey);
  if (!panel) return;
  const opening = panel.style.display === 'none';
  if (opening) refreshFoldersPanel(panelKey);
  panel.style.display = opening ? 'block' : 'none';
  if (opening) {
    requestAnimationFrame(() => {
      panel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      const scrollHost = document.getElementById('popup-content');
      if (scrollHost) scrollHost.scrollTop = Math.max(0, panel.offsetTop - 12);
    });
  }
}
function speakWord(text) {
  if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='en-US'; window.speechSynthesis.speak(u); }
}

function getFallbackWordInfo(word, opt = null) {
  return {
    ipa: opt?.ipa || '',
    pos: opt?.pos || '',
    zh: opt?.m || '（此單字暫無詳細資料）',
    ex: '',
    exZh: ''
  };
}

function renderWordPopup(word, info, panelKey, extraHtml) {
  const key = panelKey || ('w_' + (word || '').replace(/[^a-z]/gi, '_'));
  _popupWordCtx = { word, info, panelKey: key };
  const isSaved = isWordSavedAnywhere(word);

  const exLine = (info.ex || info.note) ? `<div class="pop-ex"><b>例：</b>${info.ex||info.note||''}<br><span style="color:#94a3b8;font-size:11px;margin-top:2px;display:block">${info.exZh||''}</span></div>` : '';
  const escWord = (word || '').replace(/'/g, "\\'");
  document.getElementById('popup-content').innerHTML = `
    <div class="pop-header">
      <div class="pop-title-group">
        <button class="pop-star-svg-btn" onclick="toggleStarPanel(event,'${key}')">${starSvg(isSaved)}</button>
        <span class="pop-word">${word}</span>
        <span class="pop-symbol">${info.ipa||''}</span>
      </div>
      <button class="pop-close" onclick="closePopup()">✕</button>
    </div>
    <div style="margin-bottom:4px">
      <button class="pop-audio-btn" onclick="speakWord('${escWord}');event.stopPropagation();">🔊 發音</button>
    </div>
    <div class="pop-zh-row"><span class="pop-pos-tag">${info.pos||''}</span>${meaning}</div>
    ${exLine}
    <div id="folders_panel_${key}" class="pop-folders-panel" style="display:none">
      <div class="pop-folder-title">📌 存入 7000單 資料夾：</div>
      <div class="pop-folder-grid">${buildFolderButtonsHtml(word, info.ipa||'', info.pos||'', meaning)}</div>
    </div>
    ${extraHtml ? `<div class="popup-blank-section">${extraHtml}</div>` : ''}
  `;
}

function openWordPopup(e, word, info, panelKey, extraHtml) {
  renderWordPopup(word, info, panelKey, extraHtml);
  const overlay = document.getElementById('popup-overlay');
  const popup = document.getElementById('popup-card');
  overlay.classList.add('open');

}

function showBlankPopup(e, num) {

/* ── VOCAB ── */
function addToVocab(word, ipa, pos, meaning, note) {
  if (vocabLib.some(v => v.word === word)) return;
  vocabLib.push({ word, ipa, pos, meaning, note });
  localStorage.setItem('vocabLib', JSON.stringify(vocabLib));
  updateVocabCount();
  renderVocabList();
}

function updateVocabCount() {
  const el = document.getElementById('vocab-count');
  if (el) el.textContent = vocabLib.length;
}

function renderVocabList() {
  const list = document.getElementById('vocab-list');
  if (vocabLib.length === 0) {
    list.innerHTML = '<div class="vocab-empty">單字庫是空的<br>點擊單字後可加入</div>';
    return;
  }
  list.innerHTML = '';
  for (let i = 0; i < vocabLib.length; i++) {
    const v = vocabLib[i];
    const item = document.createElement('div');
    item.className = 'vocab-item';
    item.innerHTML = `
      <span class="vi-word">${v.word}</span>
      <span class="vi-ipa">${v.ipa||''}</span>
      <span class="vi-pos">${v.pos}</span>
      <span class="vi-mean">${v.meaning}</span>
      <button class="vi-del" onclick="removeVocab(${i})">×</button>
    `;
    list.appendChild(item);
  }
}

function removeVocab(idx) {
  vocabLib.splice(idx, 1);
  localStorage.setItem('vocabLib', JSON.stringify(vocabLib));
  updateVocabCount();
  renderVocabList();
}

function toggleVocab() {
  document.getElementById('vocab-panel').classList.toggle('open');
  renderVocabList();
}

function exportVocab() {
  if (vocabLib.length === 0) { alert('單字庫是空的！'); return; }
  const blob = new Blob([JSON.stringify(vocabLib, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vocab_library.json';
  a.click();
}

function wirePassageSectionHeader(headerId, passage) {
  const header = document.getElementById(headerId);
  if (!header) return;
  const h2 = header.querySelector('h2');
  if (!h2 || header.querySelector('.section-full-trans-btn')) return;
  const row = document.createElement('div');

  h2.parentNode.insertBefore(row, h2);

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'section-full-trans-btn';

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    showFullTranslationPopup(e, passage.fullZh);
  });
  row.appendChild(btn);
}
