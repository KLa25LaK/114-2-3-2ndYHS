<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 4 單字 001–264 互動詳解卷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink-mid: #3d3d5c;
  --ink-light: #6b6b8a;
  --paper: #faf9f6;
  --paper-warm: #f4f1eb;
  --paper-line: #e8e4db;
  --accent: #c41e3a;
  --accent-light: #fce8ec;
  --gold: #b8860b;
  --gold-light: #fdf6e3;
  --blue: #1a4a7a;
  --blue-light: #e8f0fa;
  --green: #1a6640;
  --green-light: #e8f5ee;
  --shadow: rgba(26,26,46,0.12);
  --radius: 6px;
  --font-body: 'Noto Sans TC', sans-serif;
  --font-serif: 'Noto Serif TC', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.8;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: #f0ede6;
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
.site-header h1 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.header-meta { font-size: 12px; color: #a0a0b8; font-family: var(--font-mono); }
.vocab-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 8px 16px;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
}
.vocab-btn:hover { background: #a01830; }

/* ── LAYOUT ── */
.container { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── ANSWER KEY BAR ── */
.answer-bar {
  background: var(--ink);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 32px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #c8c8e0;
}
.answer-bar .bar-label { color: #fff; font-weight: 600; margin-bottom: 8px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.answer-row { display: flex; flex-wrap: wrap; gap: 4px; }
.ans-chip {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 2px 8px;
  font-size: 12px;
  white-space: nowrap;
}
.ans-chip span { color: #f0c040; font-weight: 600; }

/* ── SECTION HEADERS ── */
.section-header {
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  margin: 40px 0 24px;
  background: var(--accent-light);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.section-header h2 {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
}
.section-header p { font-size: 13px; color: var(--ink-mid); margin-top: 4px; }

/* ── QUESTION CARDS ── */
.q-card {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  transition: box-shadow 0.2s;
}
.q-card:hover { box-shadow: 0 2px 10px var(--shadow); }

.q-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-mono);
  margin-right: 8px;
  flex-shrink: 0;
}
.q-answer-badge {
  display: inline-flex;
  align-items: center;
  background: var(--green);
  color: #fff;
  border-radius: 3px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-mono);
  margin-right: 12px;
  flex-shrink: 0;
}

/* ── SENTENCE AREA ── */
.sentence-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.sentence-text {
  flex: 1;
  line-height: 2;
  font-size: 15px;
  min-width: 0;
}

/* ── CLICKABLE WORDS ── */
.word-btn {
  display: inline;
  cursor: pointer;
  border-bottom: 1px dotted var(--ink-light);
  transition: background 0.15s, color 0.15s;
  border-radius: 2px;
  padding: 0 1px;
}
.word-btn:hover {
  background: var(--blue-light);
  color: var(--blue);
  border-bottom-color: var(--blue);
}

/* ── BLANK BUTTONS ── */
.blank-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--gold-light);
  border: 1.5px solid var(--gold);
  border-radius: 4px;
  padding: 2px 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--gold);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s;
  margin: 0 2px;
}
.blank-btn:hover { background: #fdf0c0; }
.blank-btn .blank-num { font-size: 11px; color: var(--ink-light); }

/* ── OPTIONS DISPLAY ── */
.options-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.opt-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--paper-warm);
  border: 1px solid var(--paper-line);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.opt-chip:hover { background: var(--blue-light); border-color: var(--blue); }
.opt-chip.correct { background: var(--green-light); border-color: var(--green); }
.opt-chip .opt-label {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
  color: var(--ink-mid);
  min-width: 14px;
}
.opt-chip.correct .opt-label { color: var(--green); }

/* ── TRANSLATE BTN ── */
.translate-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--paper-line);
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 12px;
  color: var(--ink-mid);
  cursor: pointer;
  font-family: var(--font-body);
  margin-top: 8px;
  transition: background 0.15s, border-color 0.15s;
}
.translate-btn:hover { background: var(--paper-warm); border-color: var(--ink-light); }

/* ── PASSAGE STYLES ── */
.passage-box {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.passage-title {
  background: var(--ink);
  color: #f0ede6;
  padding: 10px 18px;
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.passage-content { padding: 20px 22px; }

.sentence-block {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--paper-line);
}
.sentence-block:last-child { border-bottom: none; }
.sentence-en { flex: 1; line-height: 2; }
.sentence-zh {
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.7;
  margin-top: 4px;
  padding: 6px 10px;
  background: var(--paper-warm);
  border-radius: 4px;
  border-left: 2px solid var(--paper-line);
}

/* ── OPTIONS BOX ── */
.options-box {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
}
.options-box-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.options-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

/* ── FULL TRANSLATION PANEL ── */
.full-trans-panel {
  background: var(--gold-light);
  border: 1px solid #e8d88a;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-top: 12px;
  display: none;
}
.full-trans-panel.open { display: block; }
.full-trans-btn {
  background: var(--gold-light);
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: var(--radius);
  padding: 7px 16px;
  font-size: 13px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
  margin-top: 16px;
}
.full-trans-btn:hover { background: #fdf0c0; }
.full-trans-text { font-size: 14px; line-height: 1.9; color: var(--ink-mid); white-space: pre-line; }

/* ── POPUP OVERLAY ── */
#popup-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: none;
}
#popup-overlay.open { display: block; }

.popup-card {
  position: fixed;
  z-index: 1000;
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(26,26,46,0.2);
  min-width: 240px;
  max-width: 400px;
  padding: 16px 18px;
  display: none;
  animation: popIn 0.15s ease;
}
.popup-card.open { display: block; }

@keyframes popIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.popup-close {
  position: absolute;
  top: 8px; right: 10px;
  background: none;
  border: none;
  font-size: 16px;
  color: var(--ink-light);
  cursor: pointer;
  line-height: 1;
}
.popup-word {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.popup-ipa {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--blue);
  margin-bottom: 6px;
}
.popup-pos {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 3px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
}
.popup-meaning { font-size: 14px; color: var(--ink-mid); line-height: 1.7; }
.popup-loading {
  color: var(--ink-light);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--paper-line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BLANK POPUP (special) ── */
.blank-popup-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.blank-answer-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.blank-answer-word {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
}
.blank-answer-pos {
  background: var(--green-light);
  color: var(--green);
  border-radius: 3px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 700;
}
.blank-reason { font-size: 13px; color: var(--ink-mid); line-height: 1.8; }
.blank-other-valid { margin-top: 10px; font-size: 12px; color: var(--ink-light); }
.blank-other-valid strong { color: var(--ink-mid); }

/* ── OPTION SET POPUP ── */
.option-set-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--paper-line);
}
.option-set-item {
  display: grid;
  grid-template-columns: 24px 100px 40px 1fr;
  gap: 6px;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid var(--paper-line);
  font-size: 13px;
}
.option-set-item:last-child { border-bottom: none; }
.option-set-item .lbl { font-family: var(--font-mono); font-weight: 700; color: var(--accent); }
.option-set-item.correct-opt .lbl { color: var(--green); }
.option-set-item .wd { font-family: var(--font-mono); font-weight: 600; }
.option-set-item .ps { font-size: 11px; color: var(--ink-light); background: var(--paper-warm); border-radius: 2px; padding: 1px 5px; text-align: center; }
.option-set-item .mn { color: var(--ink-mid); }
.option-set-item.correct-opt .wd { color: var(--green); }

/* ── TRANSLATE POPUP ── */
.trans-popup-zh { font-size: 14px; line-height: 1.9; color: var(--ink-mid); }

/* ── VOCAB LIBRARY ── */
#vocab-panel {
  position: fixed;
  top: 0; right: -380px;
  width: 360px;
  height: 100vh;
  background: #fff;
  border-left: 1px solid var(--paper-line);
  z-index: 500;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
  box-shadow: -4px 0 20px var(--shadow);
}
#vocab-panel.open { right: 0; }
.vocab-panel-header {
  background: var(--ink);
  color: #f0ede6;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.vocab-panel-header h3 { font-family: var(--font-serif); font-size: 15px; }
.vocab-panel-close { background: none; border: none; color: #f0ede6; font-size: 20px; cursor: pointer; }
.vocab-list { flex: 1; overflow-y: auto; padding: 12px; }
.vocab-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--paper-line);
  border-radius: 4px;
  margin-bottom: 6px;
  font-size: 13px;
  animation: fadeIn 0.2s ease;
}
.vocab-item .vi-word { font-family: var(--font-mono); font-weight: 600; color: var(--ink); min-width: 90px; }
.vocab-item .vi-ipa { color: var(--blue); font-family: var(--font-mono); font-size: 11px; }
.vocab-item .vi-pos { font-size: 10px; background: var(--paper-warm); color: var(--ink-light); border-radius: 2px; padding: 1px 5px; }
.vocab-item .vi-mean { color: var(--ink-mid); flex: 1; }
.vocab-item .vi-del { background: none; border: none; color: var(--ink-light); cursor: pointer; font-size: 16px; }
.vocab-empty { text-align: center; padding: 40px 20px; color: var(--ink-light); font-size: 14px; }
.vocab-footer { padding: 12px 16px; border-top: 1px solid var(--paper-line); }
.vocab-save-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.vocab-save-btn:hover { background: #a01830; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .container { padding: 16px 12px 60px; }
  .popup-card { max-width: calc(100vw - 24px); }
  .option-set-item { grid-template-columns: 20px 80px 36px 1fr; font-size: 12px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>Level 4 單字 001–264 ✦ 互動詳解卷</h1>
    <div class="header-meta">點擊任何單字查看解說 · 點空格查看答案解析</div>
  </div>
  <button class="vocab-btn" onclick="toggleVocab()">
    📖 單字庫 <span id="vocab-count">0</span>
  </button>
</header>

<div class="container">

  <!-- Answer Key -->
  <div class="answer-bar">
    <div class="bar-label">答案總覽</div>
    <div class="answer-row" id="answer-row"></div>
  </div>

  <!-- PART 1 -->
  <div class="section-header">
    <h2>Part 1：文意字彙選擇</h2>
    <p>點選任一單字查看音標、詞性與意思；點選選項字詞查看所有 ABCD 選項解說；點空格查看答題解析；點句末按鈕查看中文翻譯</p>
  </div>
  <div id="part1-container"></div>

  <!-- PART 2 PASSAGE 1 -->
  <div class="section-header">
    <h2>Part 2：文意選填 ── Passage 1</h2>
    <p>點選文章中任意單字查解說；點空格查看答案解析與詞性分析；句子旁顯示中文翻譯；文末可展開全篇翻譯</p>
  </div>
  <div id="passage1-options-container"></div>
  <div id="passage1-container"></div>

  <!-- PART 2 PASSAGE 2 -->
  <div class="section-header">
    <h2>Part 2：文意選填 ── Passage 2</h2>
    <p>點選文章中任意單字查解說；點空格查看答案解析與詞性分析；句子旁顯示中文翻譯；文末可展開全篇翻譯</p>
  </div>
  <div id="passage2-options-container"></div>
  <div id="passage2-container"></div>

</div>

<!-- Popup overlay -->
<div id="popup-overlay" onclick="closePopup()"></div>
<div class="popup-card" id="popup-card">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <div id="popup-content"></div>
</div>

<!-- Vocab Panel -->
<div id="vocab-panel">
  <div class="vocab-panel-header">
    <h3>📖 我的單字庫</h3>
    <button class="vocab-panel-close" onclick="toggleVocab()">✕</button>
  </div>
  <div class="vocab-list" id="vocab-list"></div>
  <div class="vocab-footer">
    <button class="vocab-save-btn" onclick="exportVocab()">匯出單字庫 (JSON)</button>
  </div>
</div>

<script>
/* ── DATA ── */
const EXAM = {
  answers: {
    1:'A',2:'B',3:'D',4:'C',5:'B',6:'C',7:'A',8:'B',9:'A',10:'D',
    11:'C',12:'A',13:'A',14:'B',15:'B',16:'B',17:'C',18:'A',19:'A',20:'D',
    21:'C',22:'A',23:'D',24:'F',25:'B',26:'J',27:'I',28:'G',29:'H',30:'E',
    31:'A',32:'G',33:'B',34:'F',35:'C',36:'D',37:'H',38:'J',39:'I',40:'E'
  },
  part1: [

    {num:2,ans:'B',sentence:"The CEO demanded that the statistics in the financial report be verified again , emphasizing that market analysis requires absolute [BLANK] .",translation:"執行長要求對財務報告中的統計數據再次進行驗證，並強調市場分析需要絕對的準確性。",options:[{l:'A',w:'calculation',ipa:'/ˌkælkjʊˈleɪʃən/',pos:'n.',m:'計算'},{l:'B',w:'accuracy',ipa:'/ˈækjərəsi/',pos:'n.',m:'準確性'},{l:'C',w:'circulation',ipa:'/ˌsɜːkjʊˈleɪʃən/',pos:'n.',m:'循環/發行量'},{l:'D',w:'category',ipa:'/ˈkætɪɡəri/',pos:'n.',m:'類別'}]},

/* ── PARSE SENTENCE WITH BLANKS ── */
function parseSentence(enText, qNum, options, isPassage = false) {
  const fragment = document.createDocumentFragment();
  // Split by [NUM:LETTER:WORD:POS:MEANING] or [BLANK]
  const blankRe = /\[(\d+):([A-J]):([^:]+):([^:]+):([^\]]+)\]|\[BLANK\]/g;
  let last = 0;
  let match;
  const tokens = enText.split(/(\s+)/);
  
  // We'll do a character-level parse
  let text = enText;
  let parts = [];
  let pos = 0;
  
  while ((match = blankRe.exec(text)) !== null) {
    // Text before blank
    if (match.index > pos) {
      parts.push({ type: 'text', val: text.slice(pos, match.index) });
    }
    if (match[0] === '[BLANK]') {
      parts.push({ type: 'blank', num: qNum });
    } else {
      parts.push({ type: 'blank', num: parseInt(match[1]), letter: match[2], word: match[3], pos: match[4], meaning: match[5] });
    }
    pos = match.index + match[0].length;
  }
  if (pos < text.length) parts.push({ type: 'text', val: text.slice(pos) });
  
  for (const part of parts) {
    if (part.type === 'text') {
      const words = part.val.split(/(\s+|[,.;:!?()])/);
      for (const token of words) {
        if (!token.trim() || /^[\s,.;:!?()]+$/.test(token)) {
          fragment.appendChild(document.createTextNode(token));
        } else {
          const clean = token.replace(/[^a-zA-Z']/g, '').toLowerCase();
          if (!clean || SKIP_WORDS.has(clean)) {
            fragment.appendChild(document.createTextNode(token));
          } else {
            const span = document.createElement('span');
            span.className = 'word-btn';
            span.textContent = token;
            span.dataset.word = clean;
            span.addEventListener('click', (e) => { e.stopPropagation(); showWordPopup(e, clean, span); });
            fragment.appendChild(span);
          }
        }
      }
    } else {
      const blankData = isPassage ? findBlankData(part.num) : null;
      const btn = document.createElement('button');
      btn.className = 'blank-btn';
      btn.innerHTML = `<span class="blank-num">${part.num}</span> ${part.word || '___'}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPassage) {
          showBlankPopup(e, part.num);
        } else {
          showOptionsPopup(e, qNum, options, part.letter);
        }
      });
      fragment.appendChild(btn);
    }
  }
  return fragment;
}

/* ── FIND BLANK DATA ── */
let allBlanks = {};
function buildBlankIndex() {
  for (const s of EXAM.passage1.sentences) {
    for (const b of s.blanks) allBlanks[b.num] = b;
  }
  for (const s of EXAM.passage2.sentences) {
    for (const b of s.blanks) allBlanks[b.num] = b;
  }
}

function findBlankData(num) {
  return allBlanks[num] || null;
}

/* ── BUILD PART 1 ── */

  const container = document.getElementById('part1-container');
  for (const q of EXAM.part1) {
    const card = document.createElement('div');
    card.className = 'q-card';
    
    const header = document.createElement('div');
    header.className = 'sentence-line';
    
    const numBadge = document.createElement('span');
    numBadge.className = 'q-num';
    numBadge.textContent = q.num;
    
    const ansBadge = document.createElement('span');
    ansBadge.className = 'q-answer-badge';
    ansBadge.textContent = q.ans;
    
    const sentSpan = document.createElement('span');
    sentSpan.className = 'sentence-text';
    
    // Build clickable sentence with blank
    const sentText = q.sentence.replace('[BLANK]', `[BLANK]`);
    // Replace the blank token
    const parts = q.sentence.split('[BLANK]');
    
    for (let i = 0; i < parts.length; i++) {
      appendWords(sentSpan, parts[i], q.num, q.options);
      if (i < parts.length - 1) {
        const blankBtn = document.createElement('button');
        blankBtn.className = 'blank-btn';
        const ansOpt = q.options.find(o => o.l === q.ans);
        blankBtn.innerHTML = `<span class="blank-num">${q.num}</span>${ansOpt ? ansOpt.w : '___'}`;
        blankBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showOptionsPopup(e, q.num, q.options, q.ans);
        });
        sentSpan.appendChild(blankBtn);
      }
    }
    
    header.appendChild(numBadge);
    header.appendChild(ansBadge);
    header.appendChild(sentSpan);
    card.appendChild(header);
    
    // Translate button
    const transBtn = document.createElement('button');
    transBtn.className = 'translate-btn';
    transBtn.innerHTML = '🌐 翻譯';
    transBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showTranslatePopup(e, q.translation);
    });
    card.appendChild(transBtn);
    
    // Options row (clickable)
    const optsRow = document.createElement('div');
    optsRow.className = 'options-row';
    for (const opt of q.options) {
      const chip = document.createElement('span');
      chip.className = 'opt-chip' + (opt.l === q.ans ? ' correct' : '');
      chip.innerHTML = `<span class="opt-label">${opt.l}</span><span>${opt.w}</span>`;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        showOptionsPopup(e, q.num, q.options, q.ans);
      });
      optsRow.appendChild(chip);
    }
    card.appendChild(optsRow);
    
    container.appendChild(card);
  }
}

function appendWords(container, text, qNum, options) {
  const tokens = text.split(/(\s+|[,.;:!?()']+)/);
  for (const token of tokens) {
    if (!token || /^[\s,.;:!?()']+$/.test(token)) {
      container.appendChild(document.createTextNode(token));
    } else {
      const clean = token.replace(/[^a-zA-Z']/g, '').toLowerCase().replace(/^'|'$/g,'');
      if (!clean || SKIP_WORDS.has(clean) || clean.length <= 1) {
        container.appendChild(document.createTextNode(token));
      } else {
        const span = document.createElement('span');
        span.className = 'word-btn';
        span.textContent = token;
        span.dataset.word = clean;
        span.addEventListener('click', (e) => { e.stopPropagation(); showWordPopup(e, clean, span); });
        container.appendChild(span);
      }
    }
  }
}

/* ── BUILD PASSAGE OPTIONS BOX ── */
function buildOptionsBox(passage, containerId) {
  const container = document.getElementById(containerId);
  const box = document.createElement('div');
  box.className = 'options-box';
  box.innerHTML = `<div class="options-box-title">選項字詞（點擊查看解說）</div>`;

  grid.className = 'options-grid';

    chip.addEventListener('click', (e) => {

/* ── BUILD PASSAGE ── */
function buildPassage(passage, containerId, fullTransId) {
  const container = document.getElementById(containerId);
  const box = document.createElement('div');
  box.className = 'passage-box';
  
  const title = document.createElement('div');
  title.className = 'passage-title';
  title.textContent = '文章';
  box.appendChild(title);
  
  const content = document.createElement('div');
  content.className = 'passage-content';
  
  for (const sent of passage.sentences) {
    if (sent.en === passage.sentences[passage.sentences.length-1].en && 
        passage.sentences.filter(s=>s.id===sent.id).length > 1) continue;
    
    const block = document.createElement('div');
    block.className = 'sentence-block';
    
    const enDiv = document.createElement('div');
    enDiv.className = 'sentence-en';
    
    // Parse sentence with blanks
    const parsed = parseSentencePassage(sent.en, sent.blanks, passage);
    enDiv.appendChild(parsed);
    
    block.appendChild(enDiv);
    
    const zhDiv = document.createElement('div');
    zhDiv.className = 'sentence-zh';
    zhDiv.textContent = sent.zh;
    
    const inner = document.createElement('div');
    inner.appendChild(enDiv);
    inner.appendChild(zhDiv);
    block.appendChild(inner);
    
    content.appendChild(block);
  }
  
  box.appendChild(content);
  container.appendChild(box);
  
  // Full translation button
  const fullBtn = document.createElement('button');
  fullBtn.className = 'full-trans-btn';
  fullBtn.innerHTML = '📄 展開整篇中文翻譯';
  const fullPanel = document.createElement('div');
  fullPanel.className = 'full-trans-panel';
  const fullText = document.createElement('p');
  fullText.className = 'full-trans-text';
  fullText.textContent = passage.fullZh;
  fullPanel.appendChild(fullText);
  
  fullBtn.addEventListener('click', () => {
    fullPanel.classList.toggle('open');
    fullBtn.innerHTML = fullPanel.classList.contains('open') ? '▲ 收起整篇翻譯' : '📄 展開整篇中文翻譯';
  });
  
  container.appendChild(fullBtn);
  container.appendChild(fullPanel);
}

function parseSentencePassage(enText, blanks, passage) {
  const frag = document.createDocumentFragment();
  const blankRe = /\[(\d+):([A-J]):([^:]+):([^:]+):([^\]]+)\]/g;
  let text = enText;
  let parts = [];
  let pos = 0;
  let match;
  
  while ((match = blankRe.exec(text)) !== null) {
    if (match.index > pos) parts.push({ type: 'text', val: text.slice(pos, match.index) });
    parts.push({ type: 'blank', num: parseInt(match[1]), letter: match[2], word: match[3] });
    pos = match.index + match[0].length;
  }
  if (pos < text.length) parts.push({ type: 'text', val: text.slice(pos) });
  
  for (const part of parts) {
    if (part.type === 'text') {
      const container = document.createDocumentFragment();
      appendWords(container, part.val, null, null);
      frag.appendChild(container);
    } else {
      const b = allBlanks[part.num];
      const btn = document.createElement('button');
      btn.className = 'blank-btn';
      btn.innerHTML = `<span class="blank-num">${part.num}</span>${part.word}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showBlankPopup(e, part.num);
      });
      frag.appendChild(btn);
    }
  }
  return frag;
}

/* ── POPUP FUNCTIONS ── */
function positionPopup(e) {
  const popup = document.getElementById('popup-card');
  const x = e.clientX, y = e.clientY;
  const pw = 380, ph = 300;
  let left = x + 12, top = y + 12;
  if (left + pw > window.innerWidth - 16) left = x - pw - 12;
  if (top + ph > window.innerHeight - 16) top = y - ph - 12;
  if (left < 8) left = 8;
  if (top < 8) top = 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function showPopup(e, html) {
  const overlay = document.getElementById('popup-overlay');
  const popup = document.getElementById('popup-card');
  overlay.classList.add('open');
  popup.classList.add('open');
  document.getElementById('popup-content').innerHTML = html;
  positionPopup(e);
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.getElementById('popup-card').classList.remove('open');
}

async function showWordPopup(e, word, el) {
  showPopup(e, `<div class="popup-loading"><div class="spinner"></div>載入中...</div>`);
  positionPopup(e);
  
  if (wordCache[word]) {
    renderWordPopup(word, wordCache[word]);
    return;
  }
  
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: `你是高中英文老師。請為英文單字「${word}」提供：音標(IPA)、詞性(最常見用法)、繁體中文意思(1-2個)、1句使用情境說明。只回傳JSON，格式：{"ipa":"...","pos":"...","meaning":"...","note":"..."}`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content.map(i => i.text||'').join('').replace(/```json|```/g,'').trim();
    const info = JSON.parse(text);
    wordCache[word] = info;
    renderWordPopup(word, info);
  } catch(err) {
    document.getElementById('popup-content').innerHTML = `<div class="popup-word">${word}</div><div class="popup-meaning" style="color:var(--ink-light)">載入失敗，請再試一次</div>`;
  }
}

function renderWordPopup(word, info) {
  const addBtn = `<button onclick="addToVocab('${word}', '${(info.ipa||'').replace(/'/g,"\\'")}', '${(info.pos||'').replace(/'/g,"\\'")}', '${(info.meaning||'').replace(/'/g,"\\'")}', '${(info.note||'').replace(/'/g,"\\'")}'); this.textContent='✓ 已加入'; this.disabled=true;" style="margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--font-body);">+ 加入單字庫</button>`;
  document.getElementById('popup-content').innerHTML = `
    <div class="popup-word">${word}</div>
    <div class="popup-ipa">${info.ipa || ''}</div>
    <span class="popup-pos">${info.pos || ''}</span>
    <div class="popup-meaning">${info.meaning || ''}</div>
    ${info.note ? `<div style="font-size:12px;color:var(--ink-light);margin-top:6px;border-top:1px solid var(--paper-line);padding-top:6px">${info.note}</div>` : ''}
    ${addBtn}
  `;
}

function showSingleWordInfo(e, opt) {
  showPopup(e, `
    <div class="popup-word">${opt.w}</div>
    <div class="popup-ipa">${opt.ipa||''}</div>
    <span class="popup-pos">${opt.pos}</span>
    <div class="popup-meaning">${opt.m}</div>
    <button onclick="addToVocab('${opt.w}','${(opt.ipa||'').replace(/'/g,"\\'")}','${opt.pos}','${opt.m}',''); this.textContent='✓ 已加入'; this.disabled=true;" style="margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--font-body);">+ 加入單字庫</button>
  `);
}

function showOptionsPopup(e, qNum, options, ansLetter) {
  let rows = '';
  for (const opt of options) {
    const isCorrect = opt.l === ansLetter;
    rows += `<div class="option-set-item ${isCorrect ? 'correct-opt' : ''}">
      <span class="lbl">${opt.l}</span>
      <span class="wd">${opt.w}</span>
      <span class="ps">${opt.ipa ? opt.ipa.replace(/\//g,'') : opt.pos||'—'}</span>
      <span class="mn">${opt.m}</span>
    </div>`;
  }
  const html = `
    <div class="option-set-title">第 ${qNum} 題選項解說 <span style="color:var(--green);font-size:12px">答案：${ansLetter}</span></div>
    ${rows}
    <div style="font-size:11px;color:var(--green);margin-top:8px">✓ 綠色為正確答案</div>
  `;
  showPopup(e, html);
}

function showBlankPopup(e, num) {
  const b = allBlanks[num];
  if (!b) { showPopup(e, `<div>空格資料載入失敗</div>`); return; }
  
  const html = `
    <div class="blank-popup-title">第 ${num} 格解析</div>
    <div class="blank-answer-row">
      <span class="blank-answer-word">${b.word}</span>
      <span class="blank-answer-pos">${b.pos}</span>
    </div>
    <div class="blank-reason">${b.reason.replace(/\n/g,'<br>')}</div>
  `;
  showPopup(e, html);
}

function showTranslatePopup(e, translation) {
  showPopup(e, `<div class="blank-popup-title">中文翻譯</div><div class="trans-popup-zh">${translation}</div>`);
}

/* ── VOCAB ── */
function addToVocab(word, ipa, pos, meaning, note) {
  if (vocabLib.some(v => v.word === word)) return;
  vocabLib.push({ word, ipa, pos, meaning, note });
  localStorage.setItem('vocabLib', JSON.stringify(vocabLib));
  updateVocabCount();
  renderVocabList();
}

function updateVocabCount() {
  document.getElementById('vocab-count').textContent = vocabLib.length;
}

function renderVocabList() {
  const list = document.getElementById('vocab-list');
  if (vocabLib.length === 0) {
    list.innerHTML = '<div class="vocab-empty">單字庫是空的<br>點擊單字後可加入</div>';
    return;
  }
  list.innerHTML = '';
  for (let i = 0; i < vocabLib.length; i++) {
    const v = vocabLib[i];
    const item = document.createElement('div');
    item.className = 'vocab-item';
    item.innerHTML = `
      <span class="vi-word">${v.word}</span>
      <span class="vi-ipa">${v.ipa||''}</span>
      <span class="vi-pos">${v.pos}</span>
      <span class="vi-mean">${v.meaning}</span>
      <button class="vi-del" onclick="removeVocab(${i})">×</button>
    `;
    list.appendChild(item);
  }
}

function removeVocab(idx) {
  vocabLib.splice(idx, 1);
  localStorage.setItem('vocabLib', JSON.stringify(vocabLib));
  updateVocabCount();
  renderVocabList();
}

function toggleVocab() {
  document.getElementById('vocab-panel').classList.toggle('open');
  renderVocabList();
}

function exportVocab() {
  if (vocabLib.length === 0) { alert('單字庫是空的！'); return; }
  const blob = new Blob([JSON.stringify(vocabLib, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vocab_library.json';
  a.click();
}

/* ── INIT ── */
function init() {
  buildBlankIndex();
  buildAnswerBar();
  buildPart1();
  buildOptionsBox(EXAM.passage1, 'passage1-options-container');
  buildPassage(EXAM.passage1, 'passage1-container', 'passage1-trans');
  buildOptionsBox(EXAM.passage2, 'passage2-options-container');
  buildPassage(EXAM.passage2, 'passage2-container', 'passage2-trans');
  updateVocabCount();
  renderVocabList();
  
  // Close popup on ESC
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });
}

document.addEventListener('DOMContentLoaded', init);
