{n:1,a:"C",s:"Making a [[bold]] decision that thoroughly shocked her conservative mentors, the young entrepreneur invested all her life savings into a highly volatile technology startup.",zh:"做出一個徹底震驚她那些保守導師的大膽決定後，這位年輕創業家把畢生積蓄全投入一家波動極大的科技新創公司。",opts:[["A","strict","嚴格的"],["B","domestic","國內的；家庭的"],["C","bold","大膽的"],["D","democratic","民主的"]],g:["Making a bold decision","that thoroughly shocked her conservative mentors","invested all her life savings into"]},

{n:7,a:"D",s:"Growing up on a remote farm, Jason was responsible for daily [[chores]], such as milking the cows and cleaning the barn, before he caught the school bus every morning.",zh:"在偏遠農場長大的 Jason 每天上學前都要負責日常雜務，例如擠牛奶和清理穀倉。",opts:[["A","councils","議會"],["B","salaries","薪水"],["C","democracies","民主制度"],["D","chores","雜務"]],g:["Growing up on a remote farm","such as milking the cows and cleaning the barn","before he caught the school bus"]},
{n:8,a:"A",s:"The school administration decided to [[eliminate]] all vending machines selling sugary drinks from the campus in hopes of promoting a healthier lifestyle among students.",zh:"校方決定將所有販售含糖飲料的販賣機從校園中移除，希望促進學生更健康的生活方式。",opts:[["A","eliminate","消除；移除"],["B","ban","禁止"],["C","commute","通勤"],["D","discriminate","歧視"]],g:["selling sugary drinks","in hopes of promoting","promoting a healthier lifestyle"]},
{n:9,a:"D",s:"Because the factory owners repeatedly refused to obey environmental regulations, the local government decided to completely [[ban]] the usage of certain toxic chemicals.",zh:"由於工廠業者一再拒絕遵守環保法規，地方政府決定全面禁止某些有毒化學物質的使用。",opts:[["A","commute","通勤"],["B","eliminate","消除"],["C","discriminate","歧視"],["D","ban","禁止"]],g:["Because the factory owners repeatedly refused","refused to obey environmental regulations","ban the usage of certain toxic chemicals"]},
{n:10,a:"B",s:"The human rights organization highly praised the citizens for their [[bold]] choice to stand up against the tyrannical regime during the peaceful street protest.",zh:"人權組織高度讚揚人民在和平街頭抗爭中勇敢站出來反抗暴政的選擇。",opts:[["A","domestic","國內的"],["B","bold","大膽的"],["C","strict","嚴格的"],["D","democratic","民主的"]],g:["praised the citizens for","to stand up against the tyrannical regime","stand up against"]},
{n:11,a:"C",s:"To ensure fairness in the workplace, the HR department implemented new guidelines designed to [[eliminate]] any unfair treatment based on gender or ethnicity.",zh:"為了確保職場公平，人資部門實施了新的規範，以消除任何基於性別或種族的不公平待遇。",opts:[["A","ban","禁止"],["B","discriminate","歧視"],["C","eliminate","消除"],["D","commute","通勤"]],g:["To ensure fairness in the workplace","designed to eliminate any unfair treatment","based on gender or ethnicity"]},

{n:13,a:"D",s:"The constitution ensures that the legal system is built upon equality, explicitly stating that no institution shall [[discriminate]] against individuals because of their social background.",zh:"憲法保障法律制度建立在平等之上，並明確指出任何機構都不得因個人社會背景而歧視他人。",opts:[["A","eliminate","消除"],["B","ban","禁止"],["C","commute","通勤"],["D","discriminate","歧視"]],g:["that the legal system is built upon equality","explicitly stating that no institution shall discriminate","discriminate against individuals"]},

{n:16,a:"A",s:"Although the airline offers extensive international flights, a large portion of its annual revenue still comes from its [[domestic]] routes connecting major domestic cities.",zh:"雖然這家航空公司提供大量國際航班，但它年度收入中很大一部分仍來自連接主要國內城市的國內航線。",opts:[["A","domestic","國內的"],["B","bold","大膽的"],["C","strict","嚴格的"],["D","democratic","民主的"]],g:["Although the airline offers extensive international flights","a large portion of its annual revenue","connecting major domestic cities"]},
{n:17,a:"D",s:"When the fire alarm suddenly went off during the live concert, panic struck the crowd, and the grand theater instantly turned into a scene of complete [[chaos]].",zh:"當演唱會中火警警報突然響起時，人群陷入恐慌，整座大劇院瞬間變成一片混亂。",opts:[["A","council","議會"],["B","salary","薪水"],["C","chore","雜務"],["D","chaos","混亂"]],g:["When the fire alarm suddenly went off","panic struck the crowd","turned into a scene of complete chaos"]},

function cleanKey(w){return w.toLowerCase().replace(/[^a-z'-]/g,'')}
const skipWords=new Set(['a','an','the','in','on','at','to','for','from','of','with','by','among','into','against','during','after','before','because','although','when','while','as','than','over','under','up','out','off','and','or','but','so','if','nor','yet','that','this','these','those','it','its','they','them','their','we','our','you','your','he','him','his','she','her','who','whom','which','what','where','there','here','i','me','my','is','are','was','were','be','been','being','am','have','has','had','having','do','does','did','doing','will','would','can','could','shall','should','may','might','must','not','no','all','any','some','both','each','every','more','most','other','such','only','own','same','also','just','very','too','how','why','then','now','even','still','already','once','ever']);
function isSkipWord(key){return skipWords.has(cleanKey(key));}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escapeJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function escapeQuote(s){return escapeJs(s)}
function vocabKeys(key){
  const k=cleanKey(key);
  const list=[k];
  if(k.endsWith('ies')) list.push(k.slice(0,-3)+'y');
  if(k.endsWith('es')) list.push(k.slice(0,-2),k.slice(0,-1));
  if(k.endsWith('s')) list.push(k.slice(0,-1));
  if(k.endsWith('ed')) list.push(k.slice(0,-2),k.slice(0,-1));
  if(k.endsWith('ing')) list.push(k.slice(0,-3),k.slice(0,-3)+'e');
  if(k.endsWith('e')) list.push(k.slice(0,-1));
  return [...new Set(list.filter(Boolean))];
}
function lookupVocab(key, displayWord, zhHint){
  for(const k of vocabKeys(key||displayWord)){ if(vocab[k]) return vocab[k]; if(autoVocab[k]) return autoVocab[k]; }
  const w=displayWord||key||'';
  return {pos:'—',zh:zhHint||'（可參考題幹或選項中文）',forms:'（詞彙庫可再補充字形變化）',coll:'—',ex:w?'例：請對照題幹中「'+w+'」的用法。':'—'};
}
function vocabModalHtml(title,v){
  return '<h2>'+escapeHtml(title)+'</h2><h3>詞性</h3><p>'+escapeHtml(v.pos)+'</p><h3>中文</h3><p>'+escapeHtml(v.zh)+'</p><h3>其他詞性／字形變化</h3><p>'+escapeHtml(v.forms)+'</p><h3>搭配詞</h3><p>'+escapeHtml(v.coll)+'</p><h3>例句</h3><p>'+escapeHtml(v.ex)+'</p>';
}
function phraseWords(phrase){return phrase.split(/\s+/).map(function(w){return cleanKey(w.replace(/[^A-Za-z'-]/g,''));}).filter(Boolean);}
function findGrammarRanges(tokens,grammarList){
  const wordIdx=[];tokens.forEach(function(t,i){if(t.type==='word'||t.type==='blank')wordIdx.push({i:i,key:cleanKey(t.word)});});
  const ranges=[];
  grammarList.forEach(function(g){
    const pw=phraseWords(g);if(!pw.length)return;
    outer:for(let s=0;s<=wordIdx.length-pw.length;s++){
      for(let j=0;j<pw.length;j++){if(wordIdx[s+j].key!==pw[j])continue outer;}
      ranges.push({start:wordIdx[s].i,end:wordIdx[s+pw.length-1].i,phrase:g});break;
    }
  });
  return ranges.sort(function(a,b){return a.start-b.start;});
}
function renderSentence(sentence,grammarList){
  const tokens=[];
  sentence.split(/(\[\[[^\]]+\]\]|[A-Za-z][A-Za-z'-]*)/g).filter(Boolean).forEach(function(p){
    if(p.startsWith('[['))tokens.push({type:'blank',word:p.replace(/\[\[|\]\]/g,'')});
    else if(/^[A-Za-z][A-Za-z'-]*$/.test(p))tokens.push({type:'word',word:p});
    else tokens.push({type:'text',text:p});
  });
  const ranges=findGrammarRanges(tokens,grammarList);
  function rangeAt(i){return ranges.find(function(r){return i>=r.start&&i<=r.end;})||null;}
  let out='',open=null;
  for(let i=0;i<tokens.length;i++){
    const t=tokens[i],r=(t.type==='word'||t.type==='blank')?rangeAt(i):null;
    if(r&&r.phrase!==open){if(open)out+='</span>';out+='<span class="grammar-phrase">';open=r.phrase;}
    if(!r&&open){out+='</span>';open=null;}
    if(t.type==='text')out+=t.text;
    else if(t.type==='blank'){
      const key=cleanKey(t.word),cls='blank word'+(r?' grammar-word':'');
      out+='<span class="'+cls+'" onclick="showWord(\''+escapeJs(key)+'\')">'+escapeHtml(t.word)+'</span>';
    }else{
      const key=cleanKey(t.word);
      if(isSkipWord(key)){out+='<span class="func-word">'+escapeHtml(t.word)+'</span>';}
      else{const cls='word'+(r?' grammar-word':'');out+='<span class="'+cls+'" onclick="showWord(\''+escapeJs(key)+'\')">'+escapeHtml(t.word)+'</span>';}
    }
  }
  if(open)out+='</span>';return out;
}
function render(){
  const root=document.getElementById('quiz');
  root.innerHTML=questions.map(function(q){
    var opts=q.opts.map(function(o){
      return '<button class="opt '+(o[0]===q.a?'answer':'')+'" onclick="showOption(\''+escapeQuote(o[0])+'\',\''+escapeQuote(o[1])+'\',\''+escapeQuote(o[2])+'\')">('+o[0]+') '+escapeHtml(o[1])+'</button>';
    }).join('');
    var chips=q.g.map(function(g){
      return '<button class="grammar-chip" onclick="showGrammar(\''+escapeQuote(g)+'\')">'+escapeHtml(g)+'</button>';
    }).join('');
    return '<section class="q"><div class="q-title">('+q.a+') '+q.n+'.</motion></motion>'.replace('.</motion></motion>','.</div><div class="sentence">'+renderSentence(q.s,q.g)+'</div><div class="tools"><button class="btn" onclick="showTranslation('+q.n+')">中譯</button></div><div class="options">'+opts+'</div><motion></motion>'.replace('<motion></motion>','<div class="grammar-list">'+chips+'</div></section>'));
  }).join('');
}
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('backdrop').style.display='flex'}
function hideModal(){document.getElementById('backdrop').style.display='none'}
function closeModal(e){if(e.target.id==='backdrop')hideModal()}
function showTranslation(n){const q=questions.find(function(x){return x.n===n;});showModal('<h2>第 '+n+' 題中譯</h2><p>'+escapeHtml(q.zh)+'</p>')}
function showOption(letter,word,zh){const v=lookupVocab(word,word,zh);showModal(vocabModalHtml('選項 ('+letter+') '+word,v));}
function showGrammar(key){
  const g=phraseInfo[key]||{type:'文法／用法',detail:'這個片語是本題的重要結構，請回到句子中觀察它修飾的名詞或說明的動作。',ex:''};
  const words=key.split(/\s+/).map(function(w){return w.replace(/[^A-Za-z'-]/g,'');}).filter(Boolean);
  const wordRows=words.filter(function(w){return !isSkipWord(w);}).map(function(w){const v=lookupVocab(w,w,'');return '<p><b>'+escapeHtml(w)+'</b>：'+escapeHtml(v.zh)+'（'+escapeHtml(v.pos)+'）</p>';}).join('');
  showModal('<h2>'+escapeHtml(key)+'</h2><p class="muted">'+escapeHtml(g.type)+'</p><h3>每個字的意思</h3>'+wordRows+'<h3>合起來的意思／文法功能</h3><p>'+escapeHtml(g.detail)+'</p><h3>例句</h3><p>'+escapeHtml(g.ex||'（請對照題幹英文句子觀察此結構。）')+'</p>');
}
function showWord(key){const v=lookupVocab(key,key,'');showModal(vocabModalHtml(key,v));}

render();
</script>
