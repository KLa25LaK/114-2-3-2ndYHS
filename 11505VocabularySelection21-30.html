<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>11505 學測第2回｜文意選填 21～30 檢討卷</title>
<style>
:root{
  --bg:#f3f1ec;
  --card:#fffdf8;
  --text:#111827;
  --muted:#4b5563;
  --line:#d6d3d1;
  --lv2:#1d4ed8;
  --lv2bg:#eff6ff;
  --lv3:#047857;
  --lv3bg:#ecfdf5;
  --lv4:#6d28d9;
  --lv4bg:#f5f3ff;
  --lv5:#b45309;
  --lv5bg:#fff7ed;
  --lv6:#b91c1c;
  --lv6bg:#fef2f2;
  --answer:#1d3557;
  --answerbg:#eaf3fb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  color:var(--text);
  line-height:1.72;
}

.container{
  max-width:960px;
  margin:auto;
  padding:22px 15px 130px;
}

.card{
  background:var(--card);
  border:2px solid #111827;
  border-radius:28px;
  padding:18px 22px;
  margin-bottom:14px;
  box-shadow:4px 4px 0 rgba(17,24,39,.12);
}

.top-header{
  position:sticky;
  top:0;
  z-index:1200;
  background:#dfe7ec;
}

.choice-section{background:#ead4d8}

h1{font-size:26px;margin:4px 0 10px;font-weight:950}
h2{font-size:20px;margin:2px 0 8px;font-weight:900}
.small{font-size:15px;color:var(--muted)}

.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.legend span{
  font-size:13px;font-weight:800;padding:4px 10px;border-radius:999px;border:1px solid;
}

.bank{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:720px){.bank{grid-template-columns:repeat(5,1fr)}}

.choice{
  border:2px solid #111827;
  border-radius:18px;
  padding:9px 12px;
  background:#fff;
  cursor:pointer;
  font-weight:900;
  font-size:16px;
  box-shadow:3px 3px 0 rgba(17,24,39,.14);
  transition:.15s ease;
}
.choice:hover{transform:translate(-1px,-1px);background:#f7f3ef}

.passage{font-size:20px}
.sentence{
  margin:0 0 10px;
  padding-bottom:8px;
  border-bottom:1px dashed #d8d4cf;
}
.sentence:last-child{border-bottom:0}

/* 答案格：檢討卷直接顯示 */
.blank{
  color:var(--answer);
  font-weight:950;
  cursor:pointer;
  border:1px solid #bfd0e2;
  padding:2px 8px;
  background:var(--answerbg);
  border-radius:10px;
}

/* Level 2+：虛線底線 + 分色 */
.word{
  cursor:pointer;
  border-radius:6px;
  padding:1px 4px;
  font-weight:850;
  border-bottom:2px dashed currentColor;
}
.word.lv2{color:var(--lv2);background:var(--lv2bg)}
.word.lv3{color:var(--lv3);background:var(--lv3bg)}
.word.lv4{color:var(--lv4);background:var(--lv4bg)}
.word.lv5{color:var(--lv5);background:var(--lv5bg)}
.word.lv6{color:var(--lv6);background:var(--lv6bg)}

.trans{
  color:#7b5c8e;
  border-bottom:2px dashed #c7a7b7;
  cursor:pointer;
  font-size:15px;
  font-weight:900;
  margin-left:4px;
}

.popup{
  position:absolute;
  background:#fffdf8;
  border:2px solid #111827;
  border-radius:24px;
  padding:20px 20px 16px;
  box-shadow:6px 6px 0 rgba(17,24,39,.18);
  max-width:min(480px,calc(100vw - 28px));
  z-index:999;
  font-size:16px;
  line-height:1.65;
}
.popup .close{
  position:absolute;right:10px;top:6px;
  cursor:pointer;font-weight:950;color:#7d6b60;
}

.tag{
  display:inline-block;border-radius:999px;
  background:#f4e8ea;color:#7b5c8e;
  border:1px solid #e2cfd5;
  font-size:13px;font-weight:950;
  padding:4px 10px;margin-bottom:8px;
}
.leveltag{
  display:inline-block;border-radius:999px;
  padding:2px 8px;margin-left:6px;
  font-size:12px;font-weight:950;
  border:1px solid;
}
.phonetic{color:#6b7280;font-size:15px;margin:4px 0 8px}
.sense{margin:10px 0;padding:10px 12px;border-radius:14px;background:#fff8f1;border:1px solid #e8ddd3}
.sense-title{font-weight:950;margin-bottom:4px}
.colloc{font-size:14px;color:#374151;margin-top:4px}
.example{font-size:15px;margin-top:6px;color:#1f2937}
.sound{
  display:inline-block;margin-top:8px;margin-right:6px;
  border:0;border-radius:999px;
  background:#111827;color:#fff;
  padding:8px 12px;font-weight:900;cursor:pointer;
}
.zh{background:#fff8f1;border:1px solid #e5ddd5;border-radius:18px;padding:14px;margin-top:10px}
.mini{background:#fff4e6;border:1px solid #f0dbc1;padding:11px;border-radius:14px;margin-top:10px}
.wrong div{border-top:1px solid #ece7e1;padding:6px 0}
.wrong div:first-child{border-top:0}

.hide-lv .word{
  background:transparent!important;
  color:inherit!important;
  font-weight:inherit;
  border-bottom:2px dashed #9ca3af!important;
}

.fab{
  position:fixed;right:18px;bottom:18px;
  display:flex;flex-direction:column;gap:12px;z-index:1000;
}
.fab button{
  border:2px solid #111827;border-radius:999px;
  background:#fffdf8;color:#111827;
  padding:13px 18px;font-weight:900;cursor:pointer;
  box-shadow:4px 4px 0 rgba(17,24,39,.16);
}
.fab .btn-home{background:#ead4d8}

#overlayPopup{
  position:fixed;inset:0;
  background:rgba(20,24,32,.55);
  backdrop-filter:blur(4px);
  display:flex;justify-content:center;align-items:center;
  z-index:3000;padding:20px;
}
.center-popup{
  width:min(760px,100%);max-height:85vh;overflow:auto;
  background:#fffdf8;border:2px solid #111827;border-radius:30px;
  padding:28px;box-shadow:8px 8px 0 rgba(17,24,39,.18);position:relative;
}
.big-close{
  position:absolute;right:18px;top:12px;
  font-size:22px;cursor:pointer;font-weight:900;color:#7b6d63;
}

@media(max-width:480px){
  h1{font-size:22px}
  .passage{font-size:18px}
  .bank{grid-template-columns:1fr}
}
</style>
</head>

<div class="legend">
  <span style="color:var(--lv2);border-color:#93c5fd;background:var(--lv2bg)">Level 2</span>

</section>

</div>

近年來，人們體驗食物的方式經歷了重大轉變，這在很大程度上是由外送服務的快速成長所推動的。過去，取得一餐多半意味著在家烹飪或外出用餐；如今只要在智慧型手機上輕點幾下，各種熱食就能直接送到家門口。這種轉變讓用餐更加便利，也從根本上改變了消費者與食物之間的關係。<br><br>
這個產業最值得注意的發展之一，是幽靈廚房的興起。與傳統餐廳不同，這些店家不提供內用空間，而只為外送準備食物。這種商業模式讓業主能省下租金與裝潢費用，把心力完全放在備餐上。因為這些廚房可以設在較便宜的區域，他們能以具競爭力的價格提供多樣菜單。對顧客而言，這代表不必離開舒適的家，就能取得更豐富的食物選擇。<br><br>
此外，外送 app 正在改變選餐的決策過程。在忙碌的餐廳裡，顧客可能感到必須趕快點餐；透過數位平台下單則可以慢慢調整，不必匆忙。無論是多加起司，還是從漢堡裡拿掉洋蔥，過程都更彈性、壓力更小。因此，在家享用高品質食物越來越普遍，有些情況甚至取代全家外出到高級餐廳的傳統。隨著科技持續進步，這股轉變可能還會加深；人工智慧不久後或許會依個人偏好、飲食需求或過往訂單來推薦餐點。消費者不再受地點或時間限制，隨時隨地都能期待吃到喜愛的菜色。
`;

  23:{title:'23. J convenient｜made dining more + 形容詞',why:'made dining more ___，more 後面需要形容詞。convenient = 便利的。',zh:'讓用餐更加便利。',wrong:['competitive 通常修飾 price，較少直接說 dining competitive。','pressured = 有壓力的，made dining more pressured 語意不對。','fancy = 高級的，不能表達「便利」。','driven 不能修飾 dining。']},

};

let currentPopup = null;
let levelColorsOn = true;

function resolveWord(raw){
  const key = raw.toLowerCase().replace(/[.,!?;:'"()]/g,'');
  const entry = vocabDB[key];
  if(!entry) return null;
  if(entry.base && vocabDB[entry.base]){
    return {...vocabDB[entry.base], display: raw, base: entry.base, level: entry.level || vocabDB[entry.base].level};
  }
  return {...entry, display: raw, base: key};
}

function levelTagClass(level){
  return `lv${Math.min(6, Math.max(2, level))}`;
}

function renderWord(w){
  const entry = resolveWord(w);
  if(entry && entry.level >= 2){
    const cls = levelTagClass(entry.level);
    const safe = w.toLowerCase().replace(/'/g,"\\'");
    return `<span class="word ${cls}" onclick="showVocab('${safe}',this)">${w}</span>`;
  }
  return w;
}

function processText(raw){
  let html = raw;
  html = html.replace(/\[\[(\d+):([^\]]+)\]\]/g, (_, no, word) =>
    `<span class="blank" onclick="showExplain(${no},this)">${no}. ${word}</span>`
  );
  html = html.replace(/\{([^}]+)\}/g, (_, word) => renderWord(word));
  return html;
}

function render(){
  document.getElementById('choiceBank').innerHTML = choices.map(([letter, word]) =>
    `<div class="choice" onclick="showChoice('${letter}',this)">(${letter}) ${word}</div>`
  ).join('');
  document.getElementById('passage').innerHTML = passageParts.map((p, i) =>
    `<p class="sentence">${processText(p.html)} <span class="trans" onclick="showTrans(${i},this)">翻譯</span></p>`
  ).join('');
}

function item(title, body){
  return `<div class="tag">${title}</div><div>${body}</div>`;
}

function levelBadge(level){
  const colors = {
    2:'var(--lv2)',3:'var(--lv3)',4:'var(--lv4)',5:'var(--lv5)',6:'var(--lv6)'
  };
  const c = colors[level] || '#374151';
  return `<span class="leveltag" style="color:${c};border-color:${c}">Level ${level}</span>`;
}

function buildVocabBody(entry){
  const entries = entry.entries || [];
  let html = entries.map(e => `
    <div class="sense">
      <div class="sense-title"><b>${e.pos}</b> ${e.zh}</div>
      <div class="phonetic">${e.ipa || ''}</div>
      ${e.colloc ? `<div class="colloc"><b>搭配：</b>${e.colloc}</div>` : ''}
      <div class="example"><b>例句：</b>${e.ex}</div>
      <button class="sound" onclick="speak('${(entry.base||'').replace(/'/g,"")}')">🔊 單字發音</button>
      <button class="sound" onclick="speak('${(e.ex||'').replace(/'/g,"\\'")}')">🔊 例句發音</button>
    </div>
  `).join('');
  if(entry.base && entry.base !== entry.display.toLowerCase().replace(/[.,!?;:'"()]/g,'')){
    html = `<div class="mini">文中形式：<b>${entry.display}</b>｜查詢原形：<b>${entry.base}</b></div>` + html;
  }
  return html;
}

function showPopup(content, el){
  if(currentPopup) currentPopup.remove();
  const box = document.createElement('div');
  box.className = 'popup';
  box.innerHTML = '<span class="close" onclick="closePopup()">✕</span>' + content;
  document.body.appendChild(box);
  const r = el.getBoundingClientRect();
  let left = window.scrollX + r.left;
  let top = window.scrollY + r.bottom + 6;
  if(left + 480 > window.scrollX + window.innerWidth) left = window.scrollX + window.innerWidth - 494;
  if(left < 8) left = 8;
  if(top + 320 > window.scrollY + window.innerHeight) top = window.scrollY + r.top - box.offsetHeight - 8;
  box.style.left = left + 'px';
  box.style.top = top + 'px';
  currentPopup = box;
}

function showCenterPopup(content){
  if(currentPopup) currentPopup.remove();
  const overlay = document.createElement('div');
  overlay.id = 'overlayPopup';
  overlay.innerHTML = `
    <div class="center-popup">
      <span class="big-close" onclick="closePopup()">✕</span>
      ${content}
    </div>`;
  overlay.addEventListener('click', e => { if(e.target.id === 'overlayPopup') closePopup(); });
  document.body.appendChild(overlay);
  currentPopup = overlay;
}

function closePopup(){
  if(currentPopup){ currentPopup.remove(); currentPopup = null; }
}

document.addEventListener('click', e => {
  if(!currentPopup) return;
  if(currentPopup.id === 'overlayPopup') return;
  if(currentPopup.contains(e.target)) return;
  if(e.target.closest('.blank,.word,.trans,.choice,.sound,.fab button')) return;
  closePopup();
});

function speak(text){
  if(!('speechSynthesis' in window)){ alert('此瀏覽器不支援發音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(String(text).replace(/\s*\(.*?\)/g,''));
  u.lang = 'en-US';
  u.rate = 0.82;
  window.speechSynthesis.speak(u);
}

function showVocab(w, el){
  const entry = resolveWord(w);
  if(!entry){
    showPopup(item(w, '此字尚未收錄在詞彙庫。'), el);
    return;
  }
  const title = `${entry.display} ${levelBadge(entry.level)}`;
  showPopup(item(title, buildVocabBody(entry)), el);
}

function showTrans(i, el){
  showPopup(item('句子翻譯', passageParts[i].trans), el);
}

function showExplain(n, el){
  const x = explanations[n];
  const wrong = x.wrong.map(v => `<div>${v}</div>`).join('');
  showPopup(item(x.title,
    `<b>解析</b><br>${x.why}<br><br><b>中文：</b>${x.zh}
    <div class="wrong"><b>其他選項為什麼不對？</b>${wrong}</div>`
  ), el);
}

function showChoice(letter, el){
  const word = choices.find(c => c[0] === letter)[1];
  const correctNo = Object.entries(answerMap).find(([no, l]) => l === letter)?.[0];
  const entry = resolveWord(word.split(' ')[0]);
  let body = entry
    ? buildVocabBody(entry)
    : '<p>請參考選項中文與篇章語意。</p>';
  if(correctNo){
    body += `<div class="mini"><b>本篇正確位置：</b>第 ${correctNo} 格</div>`;
  } else {
    body += `<div class="mini">此選項在本篇其他空格不適用，但仍可點選學習字義與用法。</div>`;
  }
  showPopup(item(`(${letter}) ${word} ${entry ? levelBadge(entry.level) : ''}`, body), el);
}

function toggleLevelColors(){
  levelColorsOn = !levelColorsOn;
  document.getElementById('app').classList.toggle('hide-lv', !levelColorsOn);
}

function toggleAllTranslations(){
  showCenterPopup(`<div class="tag">全文白話翻譯</div><div class="zh" style="font-size:17px;line-height:2">${fullTranslation}</div>`);
}

function goHome(){
  if(window.location.pathname.endsWith('index.html') || !document.querySelector('a[href="index.html"]')){
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    window.location.href = '11505-index.html';
  }
}

render();
</script>
